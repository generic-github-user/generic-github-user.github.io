  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const footnoteRefs = Array.from(document.querySelectorAll('a.footnote-ref'));
    if (!footnoteRefs.length) {
      return;
    }

    let openWrapper = null;
    const hideTimeouts = new WeakMap();

    const cancelScheduledClose = (wrapper) => {
      const timeoutId = hideTimeouts.get(wrapper);
      if (timeoutId) {
        clearTimeout(timeoutId);
        hideTimeouts.delete(wrapper);
      }
    };

    const scheduleClose = (wrapper) => {
      cancelScheduledClose(wrapper);
      const timeoutId = window.setTimeout(() => {
        closeTooltip(wrapper);
      }, 120);
      hideTimeouts.set(wrapper, timeoutId);
    };

    const closeTooltip = (wrapper) => {
      if (!wrapper) {
        return;
      }
      cancelScheduledClose(wrapper);
      wrapper.classList.remove('is-visible');
      const trigger = wrapper.querySelector('a.footnote-ref');
      if (trigger) {
        trigger.setAttribute('aria-expanded', 'false');
      }
      const tooltip = wrapper.querySelector('.footnote-tooltip');
      if (tooltip) {
        tooltip.classList.remove('footnote-tooltip--below');
        tooltip.style.removeProperty('--footnote-horizontal-shift');
      }
      if (openWrapper === wrapper) {
        openWrapper = null;
      }
    };

    const adjustTooltipPosition = (tooltip) => {
      if (!tooltip) {
        return;
      }
      tooltip.classList.remove('footnote-tooltip--below');
      tooltip.style.removeProperty('--footnote-horizontal-shift');
      const rect = tooltip.getBoundingClientRect();
      const margin = 16;
      let shift = 0;
      if (rect.left < margin) {
        shift = margin - rect.left;
      } else if (rect.right > window.innerWidth - margin) {
        shift = (window.innerWidth - margin) - rect.right;
      }
      if (shift !== 0) {
        tooltip.style.setProperty('--footnote-horizontal-shift', `${shift}px`);
      }
      if (rect.top < margin) {
        tooltip.classList.add('footnote-tooltip--below');
      }
    };

    const closeAllTooltips = () => {
      if (openWrapper) {
        closeTooltip(openWrapper);
      }
    };

    const showTooltip = (wrapper) => {
      const trigger = wrapper.querySelector('a.footnote-ref');
      const tooltip = wrapper.querySelector('.footnote-tooltip');
      if (!trigger || !tooltip) {
        return;
      }
      if (openWrapper && openWrapper !== wrapper) {
        closeTooltip(openWrapper);
      }
      if (wrapper.classList.contains('is-visible')) {
        cancelScheduledClose(wrapper);
        return;
      }
      adjustTooltipPosition(tooltip);
      wrapper.classList.add('is-visible');
      trigger.setAttribute('aria-expanded', 'true');
      openWrapper = wrapper;
      cancelScheduledClose(wrapper);
    };

    document.addEventListener('click', (event) => {
      if (openWrapper && !openWrapper.contains(event.target)) {
        closeAllTooltips();
      }
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        closeAllTooltips();
      }
    });

    window.addEventListener('resize', () => {
      if (openWrapper) {
        const tooltip = openWrapper.querySelector('.footnote-tooltip');
        adjustTooltipPosition(tooltip);
      }
    });

    footnoteRefs.forEach((ref) => {
      const targetId = ref.getAttribute('href');
      if (!targetId || !targetId.startsWith('#')) {
        return;
      }
      const footnote = document.getElementById(targetId.slice(1));
      if (!footnote) {
        return;
      }

      const wrapper = document.createElement('span');
      wrapper.className = 'footnote-ref-wrapper';
      ref.parentNode.insertBefore(wrapper, ref);
      wrapper.appendChild(ref);

      const tooltip = document.createElement('span');
      tooltip.className = 'footnote-tooltip';
      const clone = footnote.cloneNode(true);
      clone.querySelectorAll('.footnote-back').forEach((node) => node.remove());
      tooltip.innerHTML = `
        <span class="footnote-tooltip-body">${clone.innerHTML.trim()}</span>
      `;
      wrapper.appendChild(tooltip);

      ref.setAttribute('aria-expanded', 'false');
      ref.setAttribute('aria-haspopup', 'dialog');

      ref.addEventListener('click', (event) => {
        if (!wrapper.classList.contains('is-visible')) {
          event.preventDefault();
          showTooltip(wrapper);
        } else {
          closeTooltip(wrapper);
        }
      });

      ref.addEventListener('pointerenter', (event) => {
        if (event.pointerType === 'mouse' || event.pointerType === 'pen') {
          showTooltip(wrapper);
        }
      });

      wrapper.addEventListener('pointerleave', (event) => {
        if (event.pointerType === 'mouse' || event.pointerType === 'pen') {
          scheduleClose(wrapper);
        }
      });

      wrapper.addEventListener('pointerenter', (event) => {
        if (event.pointerType === 'mouse' || event.pointerType === 'pen') {
          cancelScheduledClose(wrapper);
        }
      });

      ref.addEventListener('focus', () => {
        showTooltip(wrapper);
      });

      wrapper.addEventListener('focusout', () => {
        requestAnimationFrame(() => {
          const active = document.activeElement;
          if (!wrapper.contains(active)) {
            closeTooltip(wrapper);
          }
        });
      });

      tooltip.addEventListener('pointerenter', (event) => {
        if (event.pointerType === 'mouse' || event.pointerType === 'pen') {
          cancelScheduledClose(wrapper);
        }
      });

      tooltip.addEventListener('pointerleave', (event) => {
        if (event.pointerType === 'mouse' || event.pointerType === 'pen') {
          scheduleClose(wrapper);
        }
      });
    });
  });
