<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

<style>
body {
  font-family: "PT Serif", serif;
  max-width: 50em;
}

p {
  text-align: justify;
  text-wrap: pretty;
  text-justify: inter-word;
}

h1, h2, h3, h4, h5, h6 {
  font-family: "Instrument Serif", serif;
}

.post-meta {
  margin: 1em 0;
}

.post-meta-stacked {
  display: none;
}

.post-meta-stacked span {
  display: block;
}

h2 .heading-anchor {
  margin-left: 0.5rem;
  text-decoration: none;
  opacity: 0;
  font-size: 0.85em;
  color: inherit;
}

h2:hover .heading-anchor,
h2:focus-within .heading-anchor {
  opacity: 1;
}

a {
  text-decoration: underline;
  text-decoration-color: #d6ccf2;
  text-decoration-thickness: 2px;
  text-underline-offset: 2px;
  transition: background-color 0.15s ease, text-decoration-color 0.15s ease;
}

a:hover,
a:focus-visible {
  background-color: #f4f0ff;
  text-decoration-color: #c0b3f0;
}

hr {
  background-color: #787878;
  border: none;
  height: 2px;
  margin: 2em 0;
}

.history-link {
  font-size: 0.85em;
  text-align: right;
  margin: 0.5rem 0 1.5rem 0;
}

.history-link-inline {
  font-size: 0.85em;
  margin: 0.25rem 0 1.25rem;
}

.history-banner {
  border-left: 4px solid #d6ccf2;
  background-color: #f4f0ff;
  padding: 0.75rem 1rem;
  margin: 1.5rem 0;
  font-size: 0.9em;
}

.diff-add {
  color: #17823a;
}

.diff-del {
  color: #b3261e;
}

.diff-lines {
  color: #5f6368;
}

ul li::marker {
  content: "– ";
  font-weight: 600;
}

.footnote-ref-wrapper {
  position: relative;
  display: inline;
}

.footnote-tooltip {
  position: absolute;
  left: 50%;
  top: 0;
  --footnote-horizontal-shift: 0px;
  transform: translate(calc(-50% + var(--footnote-horizontal-shift)), calc(-100% - 0.75rem));
  width: min(22rem, 80vw);
  background-color: #fdfdfd;
  border: 1px solid #d6ccf2;
  border-radius: 6px;
  box-shadow: 0px 15px 35px rgba(26, 26, 26, 0.2);
  padding: 0.85rem 1rem;
  font-size: 0.85em;
  line-height: 1.4;
  color: #1a1a1a;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.15s ease, transform 0.15s ease, visibility 0.15s ease;
  z-index: 50;
  background-clip: padding-box;
  overflow-wrap: break-word;
  word-break: break-word;
  white-space: normal;
  max-width: calc(100vw - 24px);
  will-change: transform;
}

.footnote-ref-wrapper.is-visible .footnote-tooltip {
  opacity: 1;
  visibility: visible;
}

.footnote-tooltip p:first-child {
  margin-top: 0;
}

.footnote-tooltip p:last-child {
  margin-bottom: 0;
}

.footnote-tooltip--below {
  top: 100%;
  transform: translate(calc(-50% + var(--footnote-horizontal-shift)), 0.75rem);
}

@media (max-width: 600px) {
  .post-meta-inline {
    display: none;
  }

  .post-meta-stacked {
    display: block;
  }

  p {
    text-align: left;
    text-wrap: normal;
    text-justify: auto;
  }

  .footnote-tooltip {
    width: min(24rem, calc(100vw - 24px));
    top: 100%;
    transform: translate(calc(-50% + var(--footnote-horizontal-shift)), 0.75rem);
  }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const footnoteRefs = Array.from(document.querySelectorAll('a.footnote-ref'));
  if (!footnoteRefs.length) {
    return;
  }

  let openWrapper = null;
  const hideTimeouts = new WeakMap();

  const cancelScheduledClose = (wrapper) => {
    const timeoutId = hideTimeouts.get(wrapper);
    if (timeoutId) {
      clearTimeout(timeoutId);
      hideTimeouts.delete(wrapper);
    }
  };

  const scheduleClose = (wrapper) => {
    cancelScheduledClose(wrapper);
    const timeoutId = window.setTimeout(() => {
      closeTooltip(wrapper);
    }, 120);
    hideTimeouts.set(wrapper, timeoutId);
  };

  const closeTooltip = (wrapper) => {
    if (!wrapper) {
      return;
    }
    cancelScheduledClose(wrapper);
    wrapper.classList.remove('is-visible');
    const trigger = wrapper.querySelector('a.footnote-ref');
    if (trigger) {
      trigger.setAttribute('aria-expanded', 'false');
    }
    const tooltip = wrapper.querySelector('.footnote-tooltip');
    if (tooltip) {
      tooltip.classList.remove('footnote-tooltip--below');
      tooltip.style.removeProperty('--footnote-horizontal-shift');
    }
    if (openWrapper === wrapper) {
      openWrapper = null;
    }
  };

  const adjustTooltipPosition = (tooltip) => {
    if (!tooltip) {
      return;
    }
    tooltip.classList.remove('footnote-tooltip--below');
    tooltip.style.removeProperty('--footnote-horizontal-shift');
    const rect = tooltip.getBoundingClientRect();
    const margin = 16;
    let shift = 0;
    if (rect.left < margin) {
      shift = margin - rect.left;
    } else if (rect.right > window.innerWidth - margin) {
      shift = (window.innerWidth - margin) - rect.right;
    }
    if (shift !== 0) {
      tooltip.style.setProperty('--footnote-horizontal-shift', `${shift}px`);
    }
    if (rect.top < margin) {
      tooltip.classList.add('footnote-tooltip--below');
    }
  };

  const closeAllTooltips = () => {
    if (openWrapper) {
      closeTooltip(openWrapper);
    }
  };

  const showTooltip = (wrapper) => {
    const trigger = wrapper.querySelector('a.footnote-ref');
    const tooltip = wrapper.querySelector('.footnote-tooltip');
    if (!trigger || !tooltip) {
      return;
    }
    if (openWrapper && openWrapper !== wrapper) {
      closeTooltip(openWrapper);
    }
    if (wrapper.classList.contains('is-visible')) {
      cancelScheduledClose(wrapper);
      return;
    }
    adjustTooltipPosition(tooltip);
    wrapper.classList.add('is-visible');
    trigger.setAttribute('aria-expanded', 'true');
    openWrapper = wrapper;
    cancelScheduledClose(wrapper);
  };

  document.addEventListener('click', (event) => {
    if (openWrapper && !openWrapper.contains(event.target)) {
      closeAllTooltips();
    }
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      closeAllTooltips();
    }
  });

  window.addEventListener('resize', () => {
    if (openWrapper) {
      const tooltip = openWrapper.querySelector('.footnote-tooltip');
      adjustTooltipPosition(tooltip);
    }
  });

  footnoteRefs.forEach((ref) => {
    const targetId = ref.getAttribute('href');
    if (!targetId || !targetId.startsWith('#')) {
      return;
    }
    const footnote = document.getElementById(targetId.slice(1));
    if (!footnote) {
      return;
    }

    const wrapper = document.createElement('span');
    wrapper.className = 'footnote-ref-wrapper';
    ref.parentNode.insertBefore(wrapper, ref);
    wrapper.appendChild(ref);

    const tooltip = document.createElement('span');
    tooltip.className = 'footnote-tooltip';
    const clone = footnote.cloneNode(true);
    clone.querySelectorAll('.footnote-back').forEach((node) => node.remove());
    tooltip.innerHTML = `
      <span class="footnote-tooltip-body">${clone.innerHTML.trim()}</span>
    `;
    wrapper.appendChild(tooltip);

    ref.setAttribute('aria-expanded', 'false');
    ref.setAttribute('aria-haspopup', 'dialog');

    ref.addEventListener('click', (event) => {
      if (!wrapper.classList.contains('is-visible')) {
        event.preventDefault();
        showTooltip(wrapper);
      } else {
        closeTooltip(wrapper);
      }
    });

    ref.addEventListener('pointerenter', (event) => {
      if (event.pointerType === 'mouse' || event.pointerType === 'pen') {
        showTooltip(wrapper);
      }
    });

    wrapper.addEventListener('pointerleave', (event) => {
      if (event.pointerType === 'mouse' || event.pointerType === 'pen') {
        scheduleClose(wrapper);
      }
    });

    wrapper.addEventListener('pointerenter', (event) => {
      if (event.pointerType === 'mouse' || event.pointerType === 'pen') {
        cancelScheduledClose(wrapper);
      }
    });

    ref.addEventListener('focus', () => {
      showTooltip(wrapper);
    });

    wrapper.addEventListener('focusout', () => {
      requestAnimationFrame(() => {
        const active = document.activeElement;
        if (!wrapper.contains(active)) {
          closeTooltip(wrapper);
        }
      });
    });

    tooltip.addEventListener('pointerenter', (event) => {
      if (event.pointerType === 'mouse' || event.pointerType === 'pen') {
        cancelScheduledClose(wrapper);
      }
    });

    tooltip.addEventListener('pointerleave', (event) => {
      if (event.pointerType === 'mouse' || event.pointerType === 'pen') {
        scheduleClose(wrapper);
      }
    });
  });
});
</script>
